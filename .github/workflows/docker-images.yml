name: Build & Push Docker Images

on:
  push:
    branches: [main]
    paths:
      - 'sources/finetune/**'
      - '.github/workflows/docker-images.yml'
  workflow_dispatch:
    description: 'Manually trigger Docker image build'

jobs:
  build-cuda:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo docker image prune -af
          df -h

      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push NVIDIA CUDA
        uses: docker/build-push-action@v5
        with:
          context: sources/finetune
          file: sources/finetune/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/finetune-worker:cuda-latest

  build-rocm:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo docker image prune -af
          df -h

      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push AMD ROCm
        uses: docker/build-push-action@v5
        with:
          context: sources/finetune
          file: sources/finetune/Dockerfile.rocm
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/finetune-worker:rocm-latest
