name: Build & Push Docker Images

on:
  push:
    branches: [main]
    paths:
      - 'sources/finetune/**'
      - '.github/workflows/docker-images.yml'
  workflow_dispatch:
    description: 'Manually trigger Docker image build'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - dockerfile: Dockerfile
            tag: cuda-latest
            label: NVIDIA CUDA
          - dockerfile: Dockerfile.rocm
            tag: rocm-latest
            label: AMD ROCm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (${{ matrix.label }})
        uses: docker/build-push-action@v5
        with:
          context: sources/finetune
          file: sources/finetune/${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/finetune-worker:${{ matrix.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
