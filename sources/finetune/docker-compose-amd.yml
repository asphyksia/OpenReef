version: "3.8"

# OpenReef Fine-Tune Source — AMD ROCm
# Providers with AMD GPUs use this compose file.
# The Provider App fetches this URL from the source's ImageEnvironments metadata.

services:
  finetune:
    image: ghcr.io/openreef/finetune-worker:rocm-latest
    build:
      context: .
      dockerfile: Dockerfile.rocm
    devices:
      - /dev/kfd
      - /dev/dri
    security_opt:
      - seccomp=unconfined
    group_add:
      - video
    ipc: host
    shm_size: "16G"
    cap_add:
      - SYS_PTRACE
    volumes:
      - /data:/workspace
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID:-}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY:-}
      - R2_ENDPOINT_URL=${R2_ENDPOINT_URL:-}
      - HSA_OVERRIDE_GFX_VERSION=${HSA_OVERRIDE_GFX_VERSION:-}
      - TORCH_ROCM_AOTRITON_ENABLE_EXPERIMENTAL=1
    command: ["--config", "/workspace/config.json"]
