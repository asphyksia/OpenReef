version: "3.8"

# OpenReef Fine-Tune Source — NVIDIA CUDA
# Providers with NVIDIA GPUs use this compose file.
# The Provider App fetches this URL from the source's ImageEnvironments metadata.

services:
  finetune:
    image: ghcr.io/openreef/finetune-worker:cuda-latest
    build:
      context: .
      dockerfile: Dockerfile
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - /data:/workspace
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
    command: ["--config", "/workspace/config.json"]
    runtime: nvidia
