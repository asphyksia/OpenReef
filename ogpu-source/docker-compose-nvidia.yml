version: "3.8"

services:
  finetune:
    image: ghcr.io/openreef/finetune-worker:latest
    build:
      context: .
      dockerfile: Dockerfile
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - /data:/workspace
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID:-}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY:-}
      - R2_ENDPOINT_URL=${R2_ENDPOINT_URL:-}
    command: ["--config", "/workspace/config.json"]
    runtime: nvidia
